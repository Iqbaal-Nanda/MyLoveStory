<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Smile ❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0f0f1b;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #ff6ea8;
            font-size: 45px;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 30px;
            padding: 12px 25px;
            border-radius: 50px;
            background: linear-gradient(45deg, #ff4d8d, #ff7eb3);
            color: white;
            text-decoration: none;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .photo-grid img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 20px;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .photo-grid img:hover {
            transform: scale(1.03);
        }
    </style>
</head>

<body>

    <a href="index.html" class="back-btn">
        ← Kembali
    </a>

    <h1>Our Smile ❤️</h1>

    <div class="photo-grid">

        <img src="images/our-smile/1.jpg">
        <img src="images/our-smile/2.jpg">
        <img src="images/our-smile/3.jpg">
        <img src="images/our-smile/4.jpg">
        <img src="images/our-smile/5.jpg">
    </div>

</body>

</html>
